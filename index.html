<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotGrabber™</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter';
  background:#05070d;
  color:#fff;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo {
  color:#00f0ff;
  font-weight:700;
  text-shadow:0 0 10px #00f0ff;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  gap:20px;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card {
  background:#0b0f1a;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  border:1px solid #00f0ff;
}

.btn {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#00f0ff,#7a5cff);
  color:#000;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th {
  border:1px solid rgba(255,255,255,0.1);
  padding:10px;
}

.status.awaiting_payment {background:orange;color:#000;}
.status.processing {background:#007bff;}
.status.approved {background:#00ff9d;color:#000;}
.status.rejected {background:red;}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">⚡ BotGrabber</div>
</div>

<div class="container">

<h2>Select Plan</h2>

<div class="grid">
  <div class="card" onclick="selectPlan('Bot Activation')">Bot Activation - $135.50</div>
  <div class="card" onclick="selectPlan('2FA Activation')">2FA - $75.40</div>
</div>

<button class="btn" onclick="createRequest()">Create Request</button>

<h2>Upload Proof</h2>
<input type="file" id="file">
<button class="btn" onclick="uploadProof()">Upload</button>

<h2>Requests</h2>
<table id="table"></table>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let selectedPlan = null;
let currentId = null;

function selectPlan(plan){
  selectedPlan = plan;
  alert("Selected: " + plan);
}

async function createRequest(){
  if(!selectedPlan) return alert("Select a plan");

  const doc = await db.collection("requests").add({
    plan: selectedPlan,
    status: "awaiting_payment",
    createdAt: Date.now()
  });

  currentId = doc.id;

  notify("New Request: " + selectedPlan);
}

async function uploadProof(){
  const file = document.getElementById("file").files[0];
  if(!file || !currentId) return alert("Missing file or request");

  const ref = storage.ref("proofs/" + currentId);
  await ref.put(file);

  const url = await ref.getDownloadURL();

  await db.collection("requests").doc(currentId).update({
    proof: url,
    status: "processing"
  });

  notify("Proof uploaded");
}

function notify(text){
  fetch("/api/telegram",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ text })
  });
}

db.collection("requests")
.orderBy("createdAt","desc")
.onSnapshot(snap=>{
  let html = `<tr><th>ID</th><th>Plan</th><th>Status</th></tr>`;

  snap.forEach(doc=>{
    const r = doc.data();
    html += `
    <tr>
      <td>${doc.id}</td>
      <td>${r.plan}</td>
      <td><span class="status ${r.status}">${r.status}</span></td>
    </tr>`;
  });

  table.innerHTML = html;
});

</script>

</body>
</html>
